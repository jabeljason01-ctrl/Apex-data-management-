<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudScale | Data Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; margin-top: 0; }
        .input-group { display: flex; gap: 10px; margin-bottom: 2rem; }
        input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:hover { background: #1d4ed8; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
        .status-tag { font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>⚖️ Weighing Scale Portal</h2>
        <p>Enter the reading from your scale to sync with the cloud database.</p>
        
        <div class="input-group">
            <input type="number" id="weightInput" placeholder="Enter weight (kg)..." step="0.01">
            <input type="text" id="unitInput" placeholder="Unit (e.g. kg)" value="kg">
            <button onclick="saveData()">Sync to Cloud</button>
        </div>

        <h3>Recent Sync History</h3>
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Weight</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="dataTable">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Initialize table on load
    window.onload = displayData;

    function saveData() {
        const weight = document.getElementById('weightInput').value;
        const unit = document.getElementById('unitInput').value;
        
        if (!weight) return alert("Please enter a weight reading.");

        const entry = {
            id: Date.now(),
            timestamp: new Date().toLocaleString(),
            weight: weight + " " + unit,
            status: "Cloud Synced"
        };

        // Get existing data from "Cloud" (LocalStorage)
        let history = JSON.parse(localStorage.getItem('scaleData')) || [];
        history.unshift(entry); // Add newest at the top
        
        localStorage.setItem('scaleData', JSON.stringify(history));
        
        // Clear input and refresh UI
        document.getElementById('weightInput').value = '';
        displayData();
    }

    function displayData() {
        const history = JSON.parse(localStorage.getItem('scaleData')) || [];
        const tableBody = document.getElementById('dataTable');
        
        tableBody.innerHTML = history.map(item => `
            <tr>
                <td>${item.timestamp}</td>
                <td><strong>${item.weight}</strong></td>
                <td><span class="status-tag">${item.status}</span></td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
