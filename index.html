<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Solutions | Data Portal</title>
    <style>
        :root { --primary: #003366; --success: #16a34a; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
        .container { max-width: 750px; margin: auto; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; }
        
        /* Logo Styling */
        .brand-header { margin-bottom: 20px; }
        .logo-img { width: 120px; height: auto; margin-bottom: 10px; }
        .brand-name { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin: 0; text-transform: uppercase; }
        .brand-tagline { font-size: 0.75rem; color: #64748b; margin-top: 5px; font-style: italic; }

        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; text-align: left; }
        .row { display: flex; gap: 10px; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .button-row { display: flex; gap: 10px; }
        button { flex: 1; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-sync { background: var(--primary); }
        .btn-export { background: var(--success); }
        
        .table-container { overflow-x: auto; margin-top: 20px; border-radius: 8px; border: 1px solid #e2e8f0; text-align: left; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: white; min-width: 600px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #64748b; }
        .col-date { width: 200px; }
        .col-weight { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="brand-header">
            <img src="logo.png" alt="Apex Solutions Logo" class="logo-img">
            <div class="brand-name">Apex Solutions</div>
            <div class="brand-tagline">Precision • Compliance • Profit</div>
        </div>

        <div class="input-group">
            <input type="text" id="clientInput" placeholder="Client Name">
            <input type="text" id="scaleIdInput" placeholder="Scale ID">
            <div class="row">
                <input type="number" id="weightInput" placeholder="Weight Value">
                <input type="text" id="unitInput" placeholder="Unit" value="kg" style="flex: 0.3;">
            </div>
            <div class="button-row">
                <button class="btn-sync" onclick="saveData()">Save Reading</button>
                <button class="btn-export" onclick="exportToExcel()">Export Excel</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-date">Date & Time</th>
                        <th>Client/Scale</th>
                        <th class="col-weight">Reading</th>
                    </tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
        <button onclick="clearLogs()" style="background:none; color:#ef4444; font-size:0.7rem; border:none; margin-top:15px; cursor:pointer;">Clear All Data</button>
    </div>
</div>

<script>
    window.onload = displayData;

    function saveData() {
        const weight = document.getElementById('weightInput').value;
        if (!weight) return alert("Enter weight");

        const entry = {
            timestamp: new Date().toLocaleString('en-GB'),
            client: document.getElementById('clientInput').value || "General",
            scaleId: document.getElementById('scaleIdInput').value || "N/A",
            weight: weight,
            unit: document.getElementById('unitInput').value || "kg"
        };

        let history = JSON.parse(localStorage.getItem('apexScaleData')) || [];
        history.unshift(entry);
        localStorage.setItem('apexScaleData', JSON.stringify(history));
        document.getElementById('weightInput').value = '';
        displayData();
    }

    function displayData() {
        const history = JSON.parse(localStorage.getItem('apexScaleData')) || [];
        document.getElementById('dataTable').innerHTML = history.map(item => `
            <tr>
                <td class="col-date">${item.timestamp}</td>
                <td><strong>${item.client}</strong><br><small>ID: ${item.scaleId}</small></td>
                <td class="col-weight">${item.weight} ${item.unit}</td>
            </tr>
        `).join('');
    }

    function exportToExcel() {
        const history = JSON.parse(localStorage.getItem('apexScaleData')) || [];
        if (history.length === 0) return;
        let csvContent = "\uFEFFDate,Time,Client,ScaleID,Weight,Unit\n";
        history.forEach(item => {
            const parts = item.timestamp.split(', ');
            csvContent += `"${parts[0]}","${parts[1]||""}","${item.client}","${item.scaleId}","${item.weight}","${item.unit}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Apex_Scale_Report.csv";
        link.click();
    }

    function clearLogs() {
        if(confirm("Delete all?")) { localStorage.removeItem('apexScaleData'); displayData(); }
    }
</script>

</body>
</html>
